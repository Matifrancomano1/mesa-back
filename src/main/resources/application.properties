# ─── DataSource ───────────────────────────────────────────────
# Configuración original para PostgreSQL (comentada)
# spring.datasource.url=jdbc:postgresql://localhost:5432/mesaayuda
# spring.datasource.username=sa
# spring.datasource.password=sa
# spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración para H2 en memoria (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:mesaayuda;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=false
# spring.flyway.baseline-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────
# Cambiar en producción por un secreto de al menos 256 bits (base64)
app.jwt.secret=NRoJH5PlW9yLb3vG2sKqX8mZeD4cF7tAhUiMnOpQrSuVwYzB1CEFL0JK6TXYWG
app.jwt.access-token-expiry=3600000
app.jwt.refresh-token-expiry=604800000

# ─── SpringDoc / Swagger ──────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Server ───────────────────────────────────────────────────
server.servlet.context-path=/
server.error.include-message=always
